<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


</head>

<body>
    <div class="background-image">
        <div class="container">
            <div class="text-center my-2 heading">
                <h1>Expense Tracker</h1>
                <i class="bi bi-pencil-square"></i>
            </div>
            <div class="my-2 p-5 shadow-lg">
                <div class="d-flex justify-content-between align-self-center" style="width: 30rem;">
                    <div>
                        <h4>Income</h4>
                        <p class="lead" id="in">0</p>
                    </div>
                    <div>
                        <h4>Expense</h4>
                        <p class="lead" id="out">0</p>
                    </div>
                </div>
                <div style="height: 150px; overflow-y: scroll;">
                    <ol>

                    </ol>
                </div>
                <hr>
                <div>
                    <div class="form-group my-2 ps-5 pe-5">
                        <label for="title"><b>Name of transaction </b></label>
                        <input type="text" name="title" class="form-control" id="title" aria-describedby="emailHelp"
                            placeholder="Enter Name of transaction">
                    </div>
                    <div class="form-group my-2 ps-5 pe-5">
                        <label for="amount"><b>Amount</b></label>
                        <input type="number" name="amount" class="form-control" id="amount"
                            placeholder="Enter Your Amount">
                    </div>
                </div>
                <div class="my-3 ps-5 pe-5">
                    <div class="form-group">
                        <form id="transactionType">

                            <label for="type"><b> Select Transaction Type: </b></label>
                            <select class="form-control" name="transactionType" id="type">
                                <option value="income">Credit</option>
                                <option value="expense">Debit</option>
                            </select>
                    </div>
                    </form>

                    <br>
                    <div id="dynamic-buttons">

                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="index.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
